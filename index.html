<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colección Funiko Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #ef4444;
            --muted: #64748b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 20px; 
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }

        /* Buscador y Filtros */
        .controls {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        #search-bar {
            padding: 12px 20px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        #search-bar:focus { border-color: var(--primary); }

        .filters { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        button { 
            padding: 8px 18px; border: none; border-radius: 20px; 
            background: #e2e8f0; color: #475569; cursor: pointer; 
            font-weight: 600; transition: 0.3s; 
        }
        button.active { background: var(--primary); color: white; }

        /* Grid y Tarjetas */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; max-width: 1200px; margin: 0 auto; 
        }

        .card { 
            background: var(--card); border-radius: 20px; overflow: hidden; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; border: 1px solid #e2e8f0;
        }

        .card-img-container { position: relative; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        
        .price-badge {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 5px 12px; border-radius: 10px; font-weight: bold;
        }

        .card-content { padding: 20px; flex-grow: 1; }
        .category-tag { color: var(--primary); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        h3 { margin: 5px 0 15px; font-size: 1.5rem; }

        /* Mini Ficha Técnica */
        .stats-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 10px; font-size: 0.85rem; color: var(--muted);
            background: #f1f5f9; padding: 12px; border-radius: 12px;
            margin-bottom: 15px;
        }
        .stat-item b { color: var(--text); }

        .btn-video { 
            display: block; text-align: center; padding: 10px; 
            background: var(--accent); color: white; text-decoration: none; 
            border-radius: 10px; font-weight: bold; font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>📦 Funiko</h1>
</header>

<div class="controls">
    <input type="text" id="search-bar" placeholder="Buscar personaje..." oninput="filtrarTodo()">
    <div class="filters" id="filter-container">
        <button id="btn-todos" class="active" onclick="filterByCategory('todos', this)">Todos</button>
    </div>
</div>

<div class="grid" id="collection-grid"></div>

<script>
    let datosCompletos = [];
    let categoriaActual = 'todos';

    async function cargarDatos() {
        try {
            const respuesta = await fetch('Funiko_BBDD.json?t=' + new Date().getTime());
            datosCompletos = await respuesta.json();
            generarBotonesFiltro();
            render(datosCompletos);
        } catch (e) { console.error("Error cargando JSON", e); }
    }

    function render(items) {
        const grid = document.getElementById('collection-grid');
        grid.innerHTML = ''; 

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img-container">
                    <img src="${item.foto}" onerror="this.src='https://via.placeholder.com'">
                    <div class="price-badge">${item.precio}</div>
                </div>
                <div class="card-content">
                    <span class="category-tag">${item.franquicia}</span>
                    <h3>${item.personaje}</h3>
                    
                    <div class="stats-grid">
                        <div class="stat-item">Nº: <b>#${item.nroFunko}</b></div>
                        <div class="stat-item">Estado: <b>${item.estado}</b></div>
                        <div class="stat-item">Caja: <b>${item.estadoCaja}</b></div>
                        <div class="stat-item">Línea: <b>${item.linea}</b></div>
                    </div>

                    ${item.video && item.video !== '#' ? 
                        `<a href="${item.video}" target="_blank" class="btn-video">▶ Ver Video Review</a>` : ''}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function generarBotonesFiltro() {
        const container = document.getElementById('filter-container');
        const franquicias = [...new Set(datosCompletos.map(i => i.franquicia))].filter(Boolean);
        franquicias.forEach(cat => {
            const btn = document.createElement('button');
            btn.innerText = cat;
            btn.onclick = (e) => filterByCategory(cat, e.target);
            container.appendChild(btn);
        });
    }

    function filterByCategory(cat, btn) {
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        categoriaActual = cat;
        filtrarTodo();
    }

    function filtrarTodo() {
        const textoBusqueda = document.getElementById('search-bar').value.toLowerCase();
        
        const filtrados = datosCompletos.filter(item => {
            const coincideCategoria = (categoriaActual === 'todos' || item.franquicia === categoriaActual);
            const coincideTexto = item.personaje.toLowerCase().includes(textoBusqueda);
            return coincideCategoria && coincideTexto;
        });
        
        render(filtrados);
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
