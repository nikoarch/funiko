<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Colección Funiko</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📦 Funiko Manager</h1>
    <div id="contador" class="stats-container"></div>
</header>

<div class="controls">
    <div class="search-wrapper">
        <input type="text" id="search-bar" placeholder="Buscar personaje..." oninput="filtrarTodo()">
        <button class="reset-btn" onclick="resetearFiltros()" title="Limpiar todo">✕</button>
    </div>
    <div class="filters" id="filter-container">
        <button id="btn-todos" class="filter-btn active" onclick="filterByCategory('todos', this)">Todos</button>
    </div>
</div>

<div class="grid" id="collection-grid"></div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" onclick="cerrarModal()">&times;</button>
        <div id="modal-body"></div>
    </div>
</div>

<div id="lightbox" class="lightbox">
    <span class="close-lightbox" onclick="cerrarLightbox()">&times;</span>
    <button class="nav-btn-light prev" onclick="event.stopPropagation(); cambiarFotoLightbox(-1)">❮</button>
    <img id="img-ampliada" src="" alt="Zoom">
    <button class="nav-btn-light next" onclick="event.stopPropagation(); cambiarFotoLightbox(1)">❯</button>
</div>

<script src="script.js"></script>
</body>
</html>
