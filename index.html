<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Catálogo Personal</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6;
        }

        header { 
            text-align: center; 
            margin-bottom: 40px; 
            padding-top: 20px;
        }

        h1 { margin-bottom: 20px; color: #0f172a; }

        /* Contenedor de Filtros */
        .filters { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }

        button { 
            padding: 10px 20px; 
            border: none; 
            border-radius: 25px; 
            background: #e2e8f0; 
            color: #475569;
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.3s ease; 
        }

        button.active { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.4);
        }

        button:hover { background: #cbd5e1; }
        button.active:hover { background: #1d4ed8; }

        /* Rejilla de la Colección */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* Tarjeta de Ítem */
        .card { 
            background: var(--card); 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-8px); }

        .card img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            background-color: #f1f5f9;
        }

        .card-content { padding: 20px; flex-grow: 1; }

        .category-tag { 
            font-size: 0.7rem; 
            font-weight: 800; 
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            display: block;
        }

        h3 { margin: 0 0 10px 0; font-size: 1.4rem; color: #0f172a; }

        p { font-size: 0.95rem; color: #64748b; margin-bottom: 20px; }
        
        .btn-video { 
            display: inline-flex; 
            align-items: center;
            padding: 10px 16px; 
            background: var(--accent); 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-size: 0.85rem; 
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-video:hover { background: #dc2626; }

        @media (max-width: 640px) {
            .grid { grid-template-columns: 1fr; }
            body { padding: 15px; }
        }
    </style>
</head>
<body>

<header>
    <h1>📦 Mi Colección</h1>
    <div class="filters" id="filter-container">
        <button id="btn-todos" class="active" onclick="filterItems('todos', this)">Todos</button>
    </div>
</header>

<div class="grid" id="collection-grid">
    </div>

<script>
    let datosCompletos = [];

    // 1. CARGAR DATOS DESDE JSON EXTERNO
    async function cargarDatos() {
        try {
            //const respuesta = await fetch('Funiko_BBDD.json');
            const respuesta = await fetch('Funiko_BBDD.json?t=' + new Date().getTime());
            if (!respuesta.ok) throw new Error('No se pudo cargar el archivo JSON');
            
            datosCompletos = await respuesta.json();
            
            generarBotonesFiltro();
            render(datosCompletos);
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('collection-grid').innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; background: white; border-radius: 12px;">
                    <p>⚠️ No se pudo cargar el catálogo.</p>
                    <small>Si estás abriendo este archivo localmente (doble clic), recuerda que necesitas subirlo a GitHub Pages o usar un servidor local para que funcione el JSON.</small>
                </div>
            `;
        }
    }

    // 2. FUNCIÓN ACTUALIZADA PARA PINTAR LOS ÍTEMS
    function render(items) {
        const grid = document.getElementById('collection-grid');
        
        // Limpiamos el contenido anterior por completo
        grid.innerHTML = ''; 

        // Si no hay items, mostramos un mensaje
        if (items.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No hay elementos en esta categoría.</p>';
            return;
        }

        // Creamos cada tarjeta
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.foto}" alt="${item.nombre}" onerror="this.src='https://via.placeholder.com/400x220?text=Sin+Imagen'">
                <div class="card-content">
                    <span class="category-tag">${item.categoria}</span>
                    <h3>${item.nombre}</h3>
                    <p>${item.descripcion}</p>
                    ${item.video && item.video !== '#' ? 
                        `<a href="${item.video}" target="_blank" class="btn-video">▶ Ver Video</a>` 
                        : ''}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 3. GENERAR BOTONES DE FILTRO BASADOS EN LAS CATEGORÍAS DEL JSON
    function generarBotonesFiltro() {
        const container = document.getElementById('filter-container');
        // Extraemos las categorías únicas
        const categorias = [...new Set(datosCompletos.map(i => i.categoria))];
        
        categorias.forEach(cat => {
            if(!cat) return; // Saltamos si no hay categoría definida
            const btn = document.createElement('button');
            btn.innerText = cat;
            btn.onclick = (e) => filterItems(cat, e.target);
            container.appendChild(btn);
        });
    }

    // 4. LÓGICA DE FILTRADO
    function filterItems(cat, btn) {
        // Actualizamos estilo de botones
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Filtramos datos
        if (cat === 'todos') {
            render(datosCompletos);
        } else {
            const filtrados = datosCompletos.filter(i => i.categoria === cat);
            render(filtrados);
        }
    }

    // Iniciar el proceso al cargar la página
    window.onload = cargarDatos;
</script>

</body>
</html>
