<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Catálogo Privado</title>
    <style>
        /* (Mismo CSS que te pasé antes...) */
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: system-ui, sans-serif; background: var(--bg); padding: 20px; }
        .filters { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        button { padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer; }
        button.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }
    </style>
</head>
<body>

<header style="text-align:center">
    <h1>📦 Mi Colección</h1>
    <div class="filters" id="filter-container">
        <button id="btn-todos" class="active">Todos</button>
    </div>
</header>

<div class="grid" id="collection-grid"></div>

<script>
    let datosCompletos = [];

    // FUNCIÓN PARA CARGAR EL JSON
    async function cargarDatos() {
        try {
            const respuesta = await fetch('datos.json');
            datosCompletos = await respuesta.json();
            
            generarBotonesFiltro();
            render(datosCompletos);
        } catch (error) {
            console.error("Error cargando el JSON. Asegúrate de estar usando un servidor local o GitHub Pages.", error);
        }
    }

    function render(items) {
        const grid = document.getElementById('collection-grid');
        grid.innerHTML = items.map(item => `
            <div class="card">
                <img src="${item.foto}" alt="${item.nombre}">
                <div class="card-content">
                    <small style="color:var(--primary)">${item.categoria}</small>
                    <h3>${item.nombre}</h3>
                    <p>${item.descripcion}</p>
                    ${item.video !== '#' ? `<a href="${item.video}" target="_blank">▶ Ver Video</a>` : ''}
                </div>
            </div>
        `).join('');
    }

    function generarBotonesFiltro() {
        const container = document.getElementById('filter-container');
        const categorias = [...new Set(datosCompletos.map(i => i.categoria))];
        
        categorias.forEach(cat => {
            const btn = document.createElement('button');
            btn.innerText = cat;
            btn.onclick = (e) => {
                document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                const filtrados = datosCompletos.filter(i => i.categoria === cat);
                render(filtrados);
            };
            container.appendChild(btn);
        });

        document.getElementById('btn-todos').onclick = (e) => {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            render(datosCompletos);
        };
    }

    // Iniciar carga
    cargarDatos();
</script>
</body>
</html>
