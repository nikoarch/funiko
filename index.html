<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Colección Personal</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        
        /* Controles de Filtro */
        .filters { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        button { padding: 8px 16px; border: none; border-radius: 20px; background: #e2e8f0; cursor: pointer; transition: 0.3s; }
        button.active { background: var(--primary); color: white; }

        /* Rejilla de la Colección */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #ddd; }
        .card-content { padding: 15px; }
        .category-tag { font-size: 0.75rem; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        h3 { margin: 5px 0; font-size: 1.25rem; }
        p { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; }
        
        .btn-video { display: inline-block; padding: 8px 12px; background: #ef4444; color: white; text-decoration: none; border-radius: 6px; font-size: 0.8rem; }
        
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>📦 Mi Catálogo</h1>
    <div class="filters" id="filter-container">
        <button class="active" onclick="filterItems('todos', this)">Todos</button>
        </div>
</header>

<div class="grid" id="collection-grid">
    </div>

<script>
    // 1. TUS DATOS (Esto es lo que podrías mover a un JSON externo luego)
    const miColeccion = [
        {
            nombre: "Reloj Omega 1960",
            categoria: "Relojes",
            descripcion: "Calibre 565, automático con calendario. Una joya vintage.",
            foto: "https://images.unsplash.com/photo-1524592094714-0f0654e20314?auto=format&fit=crop&w=400",
            video: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
        },
        {
            nombre: "Cámara Leica M3",
            categoria: "Fotografía",
            descripcion: "Cámara telemétrica de 35mm, considerada de las mejores de la historia.",
            foto: "https://images.unsplash.com/photo-1510127034890-ba27508e9f1c?auto=format&fit=crop&w=400",
            video: "#"
        },
        {
            nombre: "Moneda de Plata 1880",
            categoria: "Numismática",
            descripcion: "Dólar Morgan en excelente estado de conservación.",
            foto: "https://images.unsplash.com/photo-1625204614387-650e13745b7c?auto=format&fit=crop&w=400",
            video: "#"
        }
    ];

    const grid = document.getElementById('collection-grid');
    const filterContainer = document.getElementById('filter-container');

    // 2. GENERAR BOTONES DE FILTRO DINÁMICAMENTE
    const categorias = ['todos', ...new Set(miColeccion.map(item => item.categoria))];
    // (Solo creamos botones para las categorías que existen en los datos)

    // 3. FUNCIÓN PARA PINTAR LOS ÍTEMS
    function render(items) {
        grid.innerHTML = '';
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.foto}" alt="${item.nombre}">
                <div class="card-content">
                    <span class="category-tag">${item.categoria}</span>
                    <h3>${item.nombre}</h3>
                    <p>${item.description || item.descripcion}</p>
                    ${item.video !== '#' ? `<a href="${item.video}" target="_blank" class="btn-video">▶ Ver Video</a>` : ''}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 4. LÓGICA DE FILTRADO
    function filterItems(cat, btn) {
        // Actualizar botones UI
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Filtrar array
        if(cat === 'todos') {
            render(miColeccion);
        } else {
            const filtrados = miColeccion.filter(item => item.categoria === cat);
            render(filtrados);
        }
    }

    // Inicializar
    render(miColeccion);
    
    // Crear botones extra si hay categorías nuevas
    categorias.slice(1).forEach(cat => {
        const btn = document.createElement('button');
        btn.innerText = cat;
        btn.onclick = (e) => filterItems(cat, e.target);
        filterContainer.appendChild(btn);
    });
</script>

</body>
</html>
